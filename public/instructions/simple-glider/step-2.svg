<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" fill="none">
  <!-- Top half -->
  <rect x="20" y="100" width="260" height="90" rx="2" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
  <!-- Bottom half -->
  <rect x="20" y="190" width="260" height="90" rx="2" fill="#e2e8f0" stroke="#94a3b8" stroke-width="2"/>
  <!-- Center horizontal fold line -->
  <line x1="20" y1="190" x2="280" y2="190" stroke="#0ea5e9" stroke-width="2" stroke-dasharray="8 4"/>
  <!-- Arrow showing fold direction (bottom to top) -->
  <path d="M150 260 C130 240 130 210 150 195" stroke="#ef4444" stroke-width="2.5" fill="none" marker-end="url(#arrG)"/>
  <defs>
    <marker id="arrG" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8" fill="#ef4444"/>
    </marker>
  </defs>
  <text x="150" y="395" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#0ea5e9">Plier en deux, puis d&#233;plier</text>
</svg>