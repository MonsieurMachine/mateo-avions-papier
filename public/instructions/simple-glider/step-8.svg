<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" fill="none">
  <!-- Finished simple glider - front view, wide wings -->
  <!-- Fuselage (horizontal orientation) -->
  <line x1="60" y1="200" x2="250" y2="200" stroke="#94a3b8" stroke-width="3"/>
  <!-- Left wing (wide) -->
  <polygon points="60,200 130,100 250,100 250,200" fill="#bae6fd" stroke="#0ea5e9" stroke-width="2"/>
  <!-- Right wing (wide) -->
  <polygon points="60,200 130,300 250,300 250,200" fill="#bae6fd" stroke="#0ea5e9" stroke-width="2"/>
  <!-- Nose point -->
  <circle cx="60" cy="200" r="4" fill="#0ea5e9"/>
  <!-- V angle indicator -->
  <path d="M170 120 L150 200 L170 280" stroke="#ef4444" stroke-width="1.5" fill="none" stroke-dasharray="4 3"/>
  <text x="190" y="200" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#ef4444">Doux V</text>
  <!-- Success -->
  <text x="150" y="360" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#16a34a" font-weight="bold">Pr&#234;t &#224; planer !</text>
  <text x="150" y="390" text-anchor="middle" font-family="sans-serif" font-size="24">&#128640;</text>
</svg>