<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" fill="none">
  <!-- Paper landscape -->
  <rect x="20" y="100" width="260" height="180" rx="2" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
  <!-- Center horizontal line -->
  <line x1="20" y1="190" x2="280" y2="190" stroke="#0ea5e9" stroke-width="1.5" stroke-dasharray="6 3"/>
  <!-- Top left corner folded -->
  <polygon points="20,100 20,190 110,190" fill="#bae6fd" stroke="#0ea5e9" stroke-width="2"/>
  <!-- Bottom left corner folded to center -->
  <polygon points="20,280 20,190 110,190" fill="#bae6fd" stroke="#0ea5e9" stroke-width="2"/>
  <!-- Fold arrow -->
  <path d="M30 270 C40 250 70 220 100 195" stroke="#ef4444" stroke-width="2.5" fill="none" marker-end="url(#arr4)"/>
  <defs>
    <marker id="arr4" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8" fill="#ef4444"/>
    </marker>
  </defs>
  <text x="150" y="395" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#64748b">Coin bas gauche &#8594; ligne centrale</text>
</svg>