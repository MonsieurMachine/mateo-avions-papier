<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" fill="none">
  <!-- Paper shape with pointed left side -->
  <polygon points="20,190 110,100 280,100 280,280 110,280" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
  <!-- Center horizontal line -->
  <line x1="20" y1="190" x2="280" y2="190" stroke="#0ea5e9" stroke-width="1.5" stroke-dasharray="6 3"/>
  <!-- Previous folds (lighter) -->
  <polygon points="20,190 110,100 110,190" fill="#bae6fd" fill-opacity="0.3" stroke="#0ea5e9" stroke-width="1"/>
  <polygon points="20,190 110,280 110,190" fill="#bae6fd" fill-opacity="0.3" stroke="#0ea5e9" stroke-width="1"/>
  <!-- Top second fold -->
  <polygon points="110,100 110,190 200,190" fill="#bae6fd" fill-opacity="0.5" stroke="#0ea5e9" stroke-width="1.5"/>
  <!-- Bottom second fold -->
  <polygon points="110,280 110,190 200,190" fill="#bae6fd" stroke="#0ea5e9" stroke-width="2"/>
  <!-- Fold arrow -->
  <path d="M140 270 C150 250 170 220 195 195" stroke="#ef4444" stroke-width="2.5" fill="none" marker-end="url(#arr6)"/>
  <defs>
    <marker id="arr6" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8" fill="#ef4444"/>
    </marker>
  </defs>
  <text x="190" y="395" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#64748b">Bord inf &#8594; centre (2e fois)</text>
</svg>