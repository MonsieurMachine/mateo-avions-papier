<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 400" fill="none" font-family="system-ui,-apple-system,sans-serif">
<defs>
  <filter id="ps" x="-10%" y="-10%" width="120%" height="120%">
    <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
    <feOffset dx="0" dy="3"/>
    <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
    <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#6366f1"/>
  </marker>
  <marker id="arrT" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#14b8a6"/>
  </marker>
  <linearGradient id="foldTri" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#fff7ed"/>
    <stop offset="1" stop-color="#fed7aa" stop-opacity="0.7"/>
  </linearGradient>
</defs>

<g>
  <path d="M 80 55 Q 160 25 240 55" stroke="#14b8a6" stroke-width="2.2" stroke-linecap="round" fill="none" marker-end="url(#arrT)"/>
  <text x="160" y="80" text-anchor="middle" font-size="11" font-weight="500" fill="#0f766e" letter-spacing="0.8">RETOURNE</text>
</g>
<polygon points="80,135 240,135 240,370 80,370" fill="#fefaf4" stroke="#d6c9ae" stroke-width="1.5" filter="url(#ps)"/>
<!-- ghost of folded peak -->
<polygon points="95,135 225,135 160,335" fill="#fef3c7" stroke="#d6c9ae" stroke-width="1" opacity="0.45"/>
<line x1="160" y1="135" x2="160" y2="370" stroke="#a8a29e" stroke-width="1" stroke-dasharray="3 3" stroke-linecap="round" opacity="0.7"/>
<line x1="160" y1="135" x2="160" y2="370" stroke="#dc2626" stroke-width="2" stroke-dasharray="8 3 2 3" stroke-linecap="round"/>
<path d="M 200 250 Q 230 220 200 180" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round" fill="none" marker-end="url(#arr)" />
<text x="160" y="390" text-anchor="middle" font-size="12" fill="#78716c">Plie en 2 le long du centre</text>
</svg>
