<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" fill="none">
  <!-- Paper body -->
  <rect x="50" y="20" width="200" height="360" rx="2" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
  <!-- Center line -->
  <line x1="150" y1="20" x2="150" y2="380" stroke="#0ea5e9" stroke-width="1.5" stroke-dasharray="6 3"/>
  <!-- Folded down flap (flat nose) -->
  <rect x="50" y="20" width="200" height="160" rx="2" fill="#bae6fd" fill-opacity="0.3" stroke="#94a3b8" stroke-width="1.5"/>
  <!-- Fold line at nose -->
  <line x1="50" y1="180" x2="250" y2="180" stroke="#94a3b8" stroke-width="1.5"/>
  <!-- Left triangle fold -->
  <polygon points="50,180 150,280 150,180" fill="#bae6fd" stroke="#0ea5e9" stroke-width="2"/>
  <!-- Right triangle fold -->
  <polygon points="250,180 150,280 150,180" fill="#bae6fd" stroke="#0ea5e9" stroke-width="2"/>
  <!-- Arrow for right fold -->
  <path d="M220 190 C210 220 170 250 155 270" stroke="#ef4444" stroke-width="2.5" fill="none" marker-end="url(#arr7)"/>
  <defs>
    <marker id="arr7" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8" fill="#ef4444"/>
    </marker>
  </defs>
  <text x="150" y="395" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#64748b">Nouveau coin droit &#8594; centre</text>
</svg>