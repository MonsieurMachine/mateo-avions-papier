<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" fill="none">
  <!-- Folded shape - side view after folding in half -->
  <!-- The bulldog has a blunt nose, so the top is flat -->
  <polygon points="150,80 150,380 250,380 250,80" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
  <!-- Nose area (flat/blunt) -->
  <rect x="150" y="80" width="100" height="40" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5"/>
  <!-- Center fold line -->
  <line x1="150" y1="80" x2="150" y2="380" stroke="#0ea5e9" stroke-width="2" stroke-dasharray="8 4"/>
  <!-- Arrow showing fold in half -->
  <path d="M100 250 C110 230 130 230 145 250" stroke="#ef4444" stroke-width="2.5" fill="none" marker-end="url(#arr9)"/>
  <!-- Flip indicator -->
  <path d="M100 150 C80 130 80 110 100 100" stroke="#0ea5e9" stroke-width="2" fill="none" marker-end="url(#arr9b)"/>
  <text x="65" y="130" font-family="sans-serif" font-size="10" fill="#0ea5e9">Retourner</text>
  <defs>
    <marker id="arr9" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8" fill="#ef4444"/>
    </marker>
    <marker id="arr9b" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8" fill="#0ea5e9"/>
    </marker>
  </defs>
  <text x="150" y="395" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#64748b">Retourner, plier en deux</text>
</svg>