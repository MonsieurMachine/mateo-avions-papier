<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" fill="none">
  <!-- Finished bulldog - front view with blunt nose -->
  <!-- Fuselage -->
  <line x1="150" y1="80" x2="150" y2="340" stroke="#94a3b8" stroke-width="3"/>
  <!-- Blunt nose -->
  <rect x="140" y="75" width="20" height="15" rx="3" fill="#0ea5e9" stroke="#0ea5e9" stroke-width="1"/>
  <!-- Left wing -->
  <polygon points="150,120 50,270 150,330" fill="#bae6fd" stroke="#0ea5e9" stroke-width="2"/>
  <!-- Right wing -->
  <polygon points="150,120 250,270 150,330" fill="#bae6fd" stroke="#0ea5e9" stroke-width="2"/>
  <!-- V angle indicator -->
  <path d="M70 250 L150 290 L230 250" stroke="#ef4444" stroke-width="1.5" fill="none" stroke-dasharray="4 3"/>
  <text x="150" y="245" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#ef4444">Forme en V</text>
  <!-- Success -->
  <text x="150" y="365" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#16a34a" font-weight="bold">Le Bouledogue !</text>
  <text x="150" y="390" text-anchor="middle" font-family="sans-serif" font-size="24">&#128640;</text>
</svg>