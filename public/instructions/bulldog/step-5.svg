<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" fill="none">
  <!-- Paper body -->
  <rect x="50" y="20" width="200" height="360" rx="2" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
  <!-- Center line -->
  <line x1="150" y1="20" x2="150" y2="380" stroke="#0ea5e9" stroke-width="1.5" stroke-dasharray="6 3"/>
  <!-- Left triangle -->
  <polygon points="50,20 150,140 150,20" fill="#bae6fd" stroke="#0ea5e9" stroke-width="1.5"/>
  <!-- Right triangle -->
  <polygon points="250,20 150,140 150,20" fill="#bae6fd" stroke="#0ea5e9" stroke-width="1.5"/>
  <!-- Fold down area -->
  <polygon points="50,20 150,140 250,20 250,180 50,180" fill="#bae6fd" fill-opacity="0.5" stroke="#ef4444" stroke-width="2" stroke-dasharray="6 3"/>
  <!-- Arrow showing fold down -->
  <path d="M150 60 C155 90 155 130 150 170" stroke="#ef4444" stroke-width="2.5" fill="none" marker-end="url(#arr5)"/>
  <defs>
    <marker id="arr5" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8" fill="#ef4444"/>
    </marker>
  </defs>
  <text x="150" y="395" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#64748b">Rabattre la pointe vers le bas</text>
</svg>