<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 400" fill="none" font-family="system-ui,-apple-system,sans-serif">
<defs>
  <filter id="ps" x="-10%" y="-10%" width="120%" height="120%">
    <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
    <feOffset dx="0" dy="3"/>
    <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
    <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#6366f1"/>
  </marker>
  <marker id="arrT" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#14b8a6"/>
  </marker>
  <linearGradient id="foldTri" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#fff7ed"/>
    <stop offset="1" stop-color="#fed7aa" stop-opacity="0.7"/>
  </linearGradient>
</defs>

<polygon points="80,80 240,80 240,370 80,370" fill="#fefaf4" stroke="#d6c9ae" stroke-width="1.5" filter="url(#ps)"/>
<line x1="160" y1="80" x2="160" y2="370" stroke="#a8a29e" stroke-width="1" stroke-dasharray="3 3" stroke-linecap="round" opacity="0.7"/>
<polygon points="80,80 160,80 160,160" fill="url(#foldTri)" stroke="#c4a07c" stroke-width="1" opacity="0.9"/>
<polygon points="240,80 160,80 160,160" fill="url(#foldTri)" stroke="#c4a07c" stroke-width="1" opacity="0.9"/>
<polygon points="90,80 160,80 160,140" fill="url(#foldTri)" opacity="0.85"/>
<polygon points="230,80 160,80 160,140" fill="url(#foldTri)" opacity="0.85"/>
<line x1="90" y1="80" x2="160" y2="140" stroke="#3b82f6" stroke-width="1.7" stroke-dasharray="5 3" stroke-linecap="round"/>
<line x1="230" y1="80" x2="160" y2="140" stroke="#3b82f6" stroke-width="1.7" stroke-dasharray="5 3" stroke-linecap="round"/>
<path d="M 105 95 Q 130 95 150 130" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round" fill="none" marker-end="url(#arr)" />
<path d="M 215 95 Q 190 95 170 130" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round" fill="none" marker-end="url(#arr)" />
<text x="160" y="210" text-anchor="middle" font-size="10" fill="#a8a29e" letter-spacing="1">NEZ ÉPAIS, BEAUCOUP DE COUCHES</text>
<text x="160" y="390" text-anchor="middle" font-size="12" fill="#78716c">Encore bords inclinés → centre</text>
</svg>
