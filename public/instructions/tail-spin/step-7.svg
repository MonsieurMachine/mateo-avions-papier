<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" fill="none">
  <!-- Very narrow shape after double folds -->
  <polygon points="150,20 50,260 50,380 250,380 250,260" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
  <!-- Center fold line -->
  <line x1="150" y1="20" x2="150" y2="380" stroke="#0ea5e9" stroke-width="2" stroke-dasharray="8 4"/>
  <!-- Folded layers -->
  <polygon points="50,260 150,20 150,260" fill="#bae6fd" fill-opacity="0.5" stroke="#0ea5e9" stroke-width="1.5"/>
  <polygon points="250,260 150,20 150,260" fill="#bae6fd" fill-opacity="0.5" stroke="#0ea5e9" stroke-width="1.5"/>
  <!-- Arrow showing fold in half -->
  <path d="M230 320 C200 300 170 300 155 320" stroke="#ef4444" stroke-width="2.5" fill="none" marker-end="url(#arr7)"/>
  <defs>
    <marker id="arr7" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8" fill="#ef4444"/>
    </marker>
  </defs>
  <text x="150" y="395" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#64748b">Plier en deux</text>
</svg>