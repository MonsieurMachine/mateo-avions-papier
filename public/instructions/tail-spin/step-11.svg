<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" fill="none">
  <!-- Finished tail-spin - action view -->
  <!-- Fuselage -->
  <line x1="150" y1="50" x2="150" y2="280" stroke="#94a3b8" stroke-width="3"/>
  <!-- Left wing -->
  <polygon points="150,90 40,230 150,280" fill="#bae6fd" stroke="#0ea5e9" stroke-width="2"/>
  <!-- Right wing -->
  <polygon points="150,90 260,230 150,280" fill="#bae6fd" stroke="#0ea5e9" stroke-width="2"/>
  <!-- Nose -->
  <circle cx="150" cy="50" r="4" fill="#0ea5e9"/>
  <!-- Spiral motion indicator -->
  <path d="M80 150 C60 120 90 90 120 110 C140 125 120 150 100 140" stroke="#ef4444" stroke-width="2" fill="none" stroke-dasharray="4 3"/>
  <path d="M220 150 C240 120 210 90 180 110 C160 125 180 150 200 140" stroke="#ef4444" stroke-width="2" fill="none" stroke-dasharray="4 3"/>
  <!-- Throw direction -->
  <path d="M150 40 L150 15" stroke="#16a34a" stroke-width="2.5" fill="none" marker-end="url(#arrG)"/>
  <defs>
    <marker id="arrG" markerWidth="8" markerHeight="8" refX="4" refY="8" orient="auto">
      <path d="M0,8 L4,0 L8,8" fill="#16a34a"/>
    </marker>
  </defs>
  <text x="150" y="305" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#64748b">Bien appuyer sur tous les plis</text>
  <text x="150" y="320" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#64748b">Lancer droit devant toi !</text>
  <!-- Success -->
  <text x="150" y="355" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#16a34a" font-weight="bold">La Vrille !</text>
  <text x="150" y="390" text-anchor="middle" font-family="sans-serif" font-size="24">&#127744;</text>
</svg>