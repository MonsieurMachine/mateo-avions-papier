<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" fill="none">
  <!-- Front view with wings open -->
  <!-- Fuselage -->
  <line x1="150" y1="50" x2="150" y2="300" stroke="#94a3b8" stroke-width="3"/>
  <!-- Left wing -->
  <polygon points="150,100 40,250 150,300" fill="#bae6fd" stroke="#0ea5e9" stroke-width="2"/>
  <!-- Right wing -->
  <polygon points="150,100 260,250 150,300" fill="#bae6fd" stroke="#0ea5e9" stroke-width="2"/>
  <!-- Nose -->
  <circle cx="150" cy="50" r="4" fill="#0ea5e9"/>
  <!-- Left flap at trailing edge -->
  <rect x="55" y="265" width="25" height="12" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="4 2"/>
  <!-- Right flap at trailing edge -->
  <rect x="220" y="265" width="25" height="12" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="4 2"/>
  <!-- Arrows pointing to flaps -->
  <path d="M68 260 L68 250" stroke="#ef4444" stroke-width="2" fill="none" marker-end="url(#arr9)"/>
  <path d="M232 260 L232 250" stroke="#ef4444" stroke-width="2" fill="none" marker-end="url(#arr9b)"/>
  <defs>
    <marker id="arr9" markerWidth="6" markerHeight="6" refX="3" refY="5" orient="auto">
      <path d="M0,0 L6,0 L3,6" fill="#ef4444"/>
    </marker>
    <marker id="arr9b" markerWidth="6" markerHeight="6" refX="3" refY="5" orient="auto">
      <path d="M0,0 L6,0 L3,6" fill="#ef4444"/>
    </marker>
  </defs>
  <text x="150" y="340" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#64748b">Plier de petits volets (1cm)</text>
  <text x="150" y="355" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#64748b">&#224; l'arri&#232;re de chaque aile</text>
  <text x="150" y="395" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#64748b">Volets &#224; l'arri&#232;re des ailes</text>
</svg>