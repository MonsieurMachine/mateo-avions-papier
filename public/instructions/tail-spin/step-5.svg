<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" fill="none">
  <!-- Paper shape after first corner folds -->
  <polygon points="150,20 50,140 50,380 250,380 250,140" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
  <!-- Center line -->
  <line x1="150" y1="20" x2="150" y2="380" stroke="#0ea5e9" stroke-width="1.5" stroke-dasharray="6 3"/>
  <!-- First fold triangles (lighter) -->
  <polygon points="50,140 150,20 150,140" fill="#bae6fd" fill-opacity="0.4" stroke="#0ea5e9" stroke-width="1"/>
  <polygon points="250,140 150,20 150,140" fill="#bae6fd" fill-opacity="0.4" stroke="#0ea5e9" stroke-width="1"/>
  <!-- Second left fold - edge to center -->
  <polygon points="50,140 150,260 150,140" fill="#bae6fd" stroke="#0ea5e9" stroke-width="2"/>
  <!-- Fold arrow -->
  <path d="M70 160 C90 190 130 230 145 250" stroke="#ef4444" stroke-width="2.5" fill="none" marker-end="url(#arr5)"/>
  <defs>
    <marker id="arr5" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8" fill="#ef4444"/>
    </marker>
  </defs>
  <text x="150" y="395" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#64748b">Bord gauche &#8594; centre (2e fois)</text>
</svg>