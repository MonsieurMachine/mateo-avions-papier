<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 400" fill="none" font-family="system-ui,-apple-system,sans-serif">
<defs>
  <filter id="ps" x="-10%" y="-10%" width="120%" height="120%">
    <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
    <feOffset dx="0" dy="3"/>
    <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
    <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#6366f1"/>
  </marker>
  <marker id="arrT" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#14b8a6"/>
  </marker>
  <linearGradient id="foldTri" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#fff7ed"/>
    <stop offset="1" stop-color="#fed7aa" stop-opacity="0.7"/>
  </linearGradient>
<linearGradient id="pWingL" x1="0.5" y1="0" x2="0.2" y2="1">
    <stop offset="0" stop-color="hsl(270, 54%, 58%)"/>
    <stop offset="0.55" stop-color="hsl(270, 60%, 43%)"/>
    <stop offset="1" stop-color="hsl(270, 63%, 28%)"/>
  </linearGradient>
  <linearGradient id="pWingR" x1="0.5" y1="0" x2="0.8" y2="1">
    <stop offset="0" stop-color="hsl(270, 60%, 43%)"/>
    <stop offset="0.5" stop-color="hsl(270, 63%, 32%)"/>
    <stop offset="1" stop-color="hsl(270, 66%, 20%)"/>
  </linearGradient></defs>

<ellipse cx="160" cy="345" rx="100" ry="7" fill="#1e293b" opacity="0.13"/>
<polygon points="160,50 40,280 155,280" fill="url(#pWingL)"/>
<polygon points="160,50 165,280 280,280" fill="url(#pWingR)"/>
<line x1="160" y1="50" x2="160" y2="280" stroke="hsl(270, 30%, 82%)" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
<circle cx="160" cy="50" r="2.5" fill="#fff5f5" opacity="0.9"/>
<path d="M 55 275 Q 160 300 265 275" stroke="#14b8a6" stroke-width="1.5" stroke-dasharray="4 3" fill="none" stroke-linecap="round" opacity="0.7"/>
<text x="160" y="315" text-anchor="middle" font-size="10" fill="#0f766e" font-weight="500" letter-spacing="1">LÉGER V</text>
<text x="160" y="375" text-anchor="middle" font-size="15" font-weight="700" fill="#0f766e" letter-spacing="0.5">Prêt à voler !</text>
<!-- Left flap folded UP (arrow up) -->
<rect x="55" y="258" width="25" height="14" fill="hsl(270, 60%, 65%)" stroke="#dc2626" stroke-width="1.5"/>
<path d="M 68 258 L 68 242" stroke="#6366f1" stroke-width="2" fill="none" marker-end="url(#arr)"/>
<text x="68" y="232" text-anchor="middle" font-size="9" fill="#dc2626" font-weight="700">HAUT ↑</text>
<!-- Right flap folded DOWN (arrow down) -->
<rect x="240" y="258" width="25" height="14" fill="hsl(270, 60%, 35%)" stroke="#dc2626" stroke-width="1.5"/>
<path d="M 252 272 L 252 290" stroke="#6366f1" stroke-width="2" fill="none" marker-end="url(#arr)"/>
<text x="252" y="303" text-anchor="middle" font-size="9" fill="#dc2626" font-weight="700">BAS ↓</text>
<text x="160" y="340" text-anchor="middle" font-size="10" fill="#0f766e" font-weight="700">LE SECRET : directions opposées</text>
</svg>
