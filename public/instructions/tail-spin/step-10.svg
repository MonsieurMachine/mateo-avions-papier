<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" fill="none">
  <!-- Front view - THE SECRET step -->
  <!-- Fuselage -->
  <line x1="150" y1="50" x2="150" y2="300" stroke="#94a3b8" stroke-width="3"/>
  <!-- Left wing -->
  <polygon points="150,100 40,250 150,300" fill="#bae6fd" stroke="#0ea5e9" stroke-width="2"/>
  <!-- Right wing -->
  <polygon points="150,100 260,250 150,300" fill="#bae6fd" stroke="#0ea5e9" stroke-width="2"/>
  <!-- Nose -->
  <circle cx="150" cy="50" r="4" fill="#0ea5e9"/>
  <!-- Left flap UP -->
  <rect x="55" y="255" width="25" height="12" fill="#ef4444" fill-opacity="0.3" stroke="#ef4444" stroke-width="2"/>
  <path d="M68 267 L68 248" stroke="#ef4444" stroke-width="2.5" fill="none" marker-end="url(#arrUp)"/>
  <text x="68" y="245" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#ef4444" font-weight="bold">HAUT</text>
  <!-- Right flap DOWN -->
  <rect x="220" y="270" width="25" height="12" fill="#0ea5e9" fill-opacity="0.3" stroke="#0ea5e9" stroke-width="2"/>
  <path d="M232 268 L232 287" stroke="#0ea5e9" stroke-width="2.5" fill="none" marker-end="url(#arrDn)"/>
  <text x="232" y="298" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#0ea5e9" font-weight="bold">BAS</text>
  <defs>
    <marker id="arrUp" markerWidth="8" markerHeight="8" refX="4" refY="8" orient="auto">
      <path d="M0,8 L4,0 L8,8" fill="#ef4444"/>
    </marker>
    <marker id="arrDn" markerWidth="8" markerHeight="8" refX="4" refY="0" orient="auto">
      <path d="M0,0 L4,8 L8,0" fill="#0ea5e9"/>
    </marker>
  </defs>
  <!-- Secret label -->
  <text x="150" y="340" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#ef4444" font-weight="bold">LE SECRET !</text>
  <text x="150" y="360" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#64748b">Un volet en haut, l'autre en bas</text>
  <text x="150" y="375" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#64748b">= l'avion tourne en spirale !</text>
  <text x="150" y="395" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#ef4444">Volets oppos&#233;s = vrille</text>
</svg>