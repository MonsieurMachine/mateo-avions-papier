<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 400" fill="none" font-family="system-ui,-apple-system,sans-serif">
<defs>
  <filter id="ps" x="-10%" y="-10%" width="120%" height="120%">
    <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
    <feOffset dx="0" dy="3"/>
    <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
    <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#6366f1"/>
  </marker>
  <marker id="arrT" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#14b8a6"/>
  </marker>
  <linearGradient id="foldTri" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#fff7ed"/>
    <stop offset="1" stop-color="#fed7aa" stop-opacity="0.7"/>
  </linearGradient>
<linearGradient id="pWingL" x1="0.5" y1="0" x2="0.2" y2="1">
    <stop offset="0" stop-color="hsl(240, 41%, 58%)"/>
    <stop offset="0.55" stop-color="hsl(240, 45%, 43%)"/>
    <stop offset="1" stop-color="hsl(240, 47%, 28%)"/>
  </linearGradient>
  <linearGradient id="pWingR" x1="0.5" y1="0" x2="0.8" y2="1">
    <stop offset="0" stop-color="hsl(240, 45%, 43%)"/>
    <stop offset="0.5" stop-color="hsl(240, 47%, 32%)"/>
    <stop offset="1" stop-color="hsl(240, 50%, 20%)"/>
  </linearGradient></defs>

<g transform="translate(160, 180)">
  <polygon points="0,-80 25,-25 80,0 25,25 0,80 -25,25 -80,0 -25,-25"
           fill="hsl(240, 45%, 35%)" stroke="hsl(240, 45%, 20%)" stroke-width="2"/>
  <circle cx="0" cy="0" r="8" fill="hsl(240, 45%, 65%)"/>
</g>
<!-- spin motion lines -->
<path d="M 85 90 Q 90 110 110 115" stroke="#dc2626" stroke-width="2" fill="none" stroke-linecap="round"/>
<path d="M 235 90 Q 230 110 210 115" stroke="#dc2626" stroke-width="2" fill="none" stroke-linecap="round"/>
<text x="160" y="340" text-anchor="middle" font-size="13" font-weight="700" fill="#0f766e">Prêt à tournoyer 🌀</text>
</svg>
