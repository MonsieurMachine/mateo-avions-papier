<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 400" fill="none" font-family="system-ui,-apple-system,sans-serif">
<defs>
  <filter id="ps" x="-10%" y="-10%" width="120%" height="120%">
    <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
    <feOffset dx="0" dy="3"/>
    <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
    <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#6366f1"/>
  </marker>
  <marker id="arrT" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#14b8a6"/>
  </marker>
  <linearGradient id="foldTri" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#fff7ed"/>
    <stop offset="1" stop-color="#fed7aa" stop-opacity="0.7"/>
  </linearGradient>
</defs>

<!-- flat band shape -->
<rect x="80" y="180" width="160" height="40" fill="#fef3c7" stroke="#d6c9ae" stroke-width="1.5" filter="url(#ps)"/>
<line x1="110" y1="180" x2="80" y2="160" stroke="#3b82f6" stroke-width="1.7" stroke-dasharray="5 3" stroke-linecap="round"/>
<line x1="210" y1="180" x2="240" y2="160" stroke="#3b82f6" stroke-width="1.7" stroke-dasharray="5 3" stroke-linecap="round"/>
<line x1="110" y1="220" x2="80" y2="240" stroke="#3b82f6" stroke-width="1.7" stroke-dasharray="5 3" stroke-linecap="round"/>
<line x1="210" y1="220" x2="240" y2="240" stroke="#3b82f6" stroke-width="1.7" stroke-dasharray="5 3" stroke-linecap="round"/>
<!-- 4 diagonal wing projections -->
<polygon points="80,160 110,180 80,200" fill="url(#foldTri)" stroke="#c4a07c" opacity="0.75"/>
<polygon points="240,160 210,180 240,200" fill="url(#foldTri)" stroke="#c4a07c" opacity="0.75"/>
<polygon points="80,240 110,220 80,200" fill="url(#foldTri)" stroke="#c4a07c" opacity="0.75"/>
<polygon points="240,240 210,220 240,200" fill="url(#foldTri)" stroke="#c4a07c" opacity="0.75"/>
<text x="160" y="390" text-anchor="middle" font-size="12" fill="#78716c">Rabats les ailes en diagonale — étoile</text>
</svg>
