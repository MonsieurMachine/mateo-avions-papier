<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" fill="none">
  <!-- Folded shape -->
  <polygon points="150,20 50,140 50,380 250,380 250,140" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
  <!-- Center fold line -->
  <line x1="150" y1="20" x2="150" y2="380" stroke="#0ea5e9" stroke-width="2" stroke-dasharray="8 4"/>
  <!-- Triangles on top -->
  <polygon points="50,140 150,20 150,140" fill="#bae6fd" stroke="#0ea5e9" stroke-width="1.5"/>
  <polygon points="250,140 150,20 150,140" fill="#bae6fd" stroke="#0ea5e9" stroke-width="1.5"/>
  <!-- Arrow showing fold -->
  <path d="M230 300 C200 280 170 280 155 300" stroke="#ef4444" stroke-width="2.5" fill="none" marker-end="url(#arr5)"/>
  <defs>
    <marker id="arr5" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8" fill="#ef4444"/>
    </marker>
  </defs>
  <text x="150" y="395" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#64748b">Plier en deux</text>
</svg>