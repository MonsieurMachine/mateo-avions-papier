<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" fill="none">
  <!-- Left half -->
  <rect x="50" y="20" width="100" height="360" rx="2" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
  <!-- Right half -->
  <rect x="150" y="20" width="100" height="360" rx="2" fill="#e2e8f0" stroke="#94a3b8" stroke-width="2"/>
  <!-- Center fold line -->
  <line x1="150" y1="20" x2="150" y2="380" stroke="#0ea5e9" stroke-width="2" stroke-dasharray="8 4"/>
  <!-- Arrow showing fold direction -->
  <path d="M220 200 C200 180 170 180 155 200" stroke="#ef4444" stroke-width="2.5" fill="none" marker-end="url(#arrowR)"/>
  <defs>
    <marker id="arrowR" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8" fill="#ef4444"/>
    </marker>
  </defs>
  <text x="150" y="395" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#0ea5e9">Pli central, puis d&#233;plier</text>
</svg>