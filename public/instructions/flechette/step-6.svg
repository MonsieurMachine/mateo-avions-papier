<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" fill="none">
  <!-- Finished flechette - front view -->
  <!-- Fuselage -->
  <line x1="150" y1="40" x2="150" y2="340" stroke="#94a3b8" stroke-width="3"/>
  <!-- Left wing -->
  <polygon points="150,100 40,280 150,340" fill="#bae6fd" stroke="#0ea5e9" stroke-width="2"/>
  <!-- Right wing -->
  <polygon points="150,100 260,280 150,340" fill="#bae6fd" stroke="#0ea5e9" stroke-width="2"/>
  <!-- Nose point -->
  <circle cx="150" cy="40" r="4" fill="#0ea5e9"/>
  <!-- V angle indicator -->
  <path d="M60 260 L150 300 L240 260" stroke="#ef4444" stroke-width="1.5" fill="none" stroke-dasharray="4 3"/>
  <text x="150" y="250" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#ef4444">Forme en V</text>
  <!-- Success -->
  <text x="150" y="370" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#16a34a" font-weight="bold">Pr&#234;t &#224; voler !</text>
  <text x="150" y="390" text-anchor="middle" font-family="sans-serif" font-size="24">&#128640;</text>
</svg>