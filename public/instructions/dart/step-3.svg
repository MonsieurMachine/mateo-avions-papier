<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 400" fill="none" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="paperShadow3" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="3"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow3" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6366f1"/>
    </marker>
    <!-- Subtle gradient for the folded triangle (top layer) -->
    <linearGradient id="foldedTri3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff7ed"/>
      <stop offset="1" stop-color="#fed7aa" stop-opacity="0.7"/>
    </linearGradient>
  </defs>

  <!-- Paper base -->
  <rect x="80" y="30" width="160" height="340" rx="3"
        fill="#fefaf4" stroke="#d6c9ae" stroke-width="1.5"
        filter="url(#paperShadow3)"/>

  <!-- Existing center crease (already folded then unfolded) -->
  <line x1="160" y1="30" x2="160" y2="370"
        stroke="#a8a29e" stroke-width="1" stroke-dasharray="3 3" stroke-linecap="round" opacity="0.7"/>

  <!-- Folded top-left triangle (shown as semi-transparent fold on top) -->
  <polygon points="80,30 160,30 160,110"
           fill="url(#foldedTri3)" stroke="#c4a07c" stroke-width="1.2"/>

  <!-- The diagonal fold edge (valley fold line just formed) -->
  <line x1="80" y1="30" x2="160" y2="110"
        stroke="#3b82f6" stroke-width="1.6" stroke-dasharray="5 3" stroke-linecap="round"/>

  <!-- Motion arrow: top-left corner arcing down to center line -->
  <path d="M 95 50 Q 130 35 150 95"
        stroke="#6366f1" stroke-width="2.5" stroke-linecap="round"
        fill="none" marker-end="url(#arrow3)"/>

  <!-- Label -->
  <text x="160" y="390" text-anchor="middle" font-size="12" fill="#78716c" letter-spacing="0.5">
    Coin gauche → ligne centrale
  </text>
</svg>
