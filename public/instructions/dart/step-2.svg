<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 400" fill="none" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="paperShadow2" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="3"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6366f1"/>
    </marker>
  </defs>

  <!-- Paper -->
  <rect x="80" y="30" width="160" height="340" rx="3"
        fill="#fefaf4" stroke="#d6c9ae" stroke-width="1.5"
        filter="url(#paperShadow2)"/>

  <!-- Future fold line (valley fold, vertical center) -->
  <line x1="160" y1="30" x2="160" y2="370"
        stroke="#3b82f6" stroke-width="1.8" stroke-dasharray="6 4" stroke-linecap="round"/>

  <!-- Arc arrow: left edge curving to right -->
  <path d="M 100 195 Q 160 80 220 195"
        stroke="#6366f1" stroke-width="2.5" stroke-linecap="round"
        fill="none" marker-end="url(#arrow2)"/>

  <!-- Label -->
  <text x="160" y="390" text-anchor="middle" font-size="12" fill="#78716c" letter-spacing="0.5">
    Plie en 2 dans la longueur
  </text>
</svg>
