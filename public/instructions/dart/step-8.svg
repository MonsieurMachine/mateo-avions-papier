<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 400" fill="none" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="wingLeft8" x1="0.5" y1="0" x2="0.2" y2="1">
      <stop offset="0" stop-color="#fca5a5"/>
      <stop offset="0.55" stop-color="#ef4444"/>
      <stop offset="1" stop-color="#b91c1c"/>
    </linearGradient>
    <linearGradient id="wingRight8" x1="0.5" y1="0" x2="0.8" y2="1">
      <stop offset="0" stop-color="#ef4444"/>
      <stop offset="0.5" stop-color="#c53030"/>
      <stop offset="1" stop-color="#7f1d1d"/>
    </linearGradient>
    <filter id="planeShadow8" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="2" dy="4"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="vArrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#14b8a6"/>
    </marker>
  </defs>

  <!-- Soft ground shadow -->
  <ellipse cx="160" cy="345" rx="105" ry="8" fill="#1e293b" opacity="0.13"/>

  <!-- Front view of finished dart with wings in slight V -->
  <g filter="url(#planeShadow8)">
    <!-- Left wing -->
    <polygon
      points="160,50 40,280 155,280"
      fill="url(#wingLeft8)"/>

    <!-- Right wing -->
    <polygon
      points="160,50 165,280 280,280"
      fill="url(#wingRight8)"/>

    <!-- Fuselage center line -->
    <line x1="160" y1="50" x2="160" y2="280"
          stroke="#fecaca" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
    <line x1="161" y1="52" x2="161" y2="282"
          stroke="#7f1d1d" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>

    <!-- Nose tip highlight -->
    <circle cx="160" cy="50" r="2.5" fill="#fff5f5" opacity="0.9"/>
  </g>

  <!-- V-angle indicator -->
  <path d="M 55 275 Q 160 300 265 275"
        stroke="#14b8a6" stroke-width="1.5" stroke-dasharray="4 3"
        fill="none" stroke-linecap="round" opacity="0.7"/>
  <text x="160" y="315" text-anchor="middle" font-size="10" fill="#0f766e" font-weight="500" letter-spacing="1">
    LÉGER V
  </text>

  <!-- Success indicator -->
  <text x="160" y="375" text-anchor="middle" font-size="15" font-weight="700" fill="#0f766e" letter-spacing="0.5">
    Prêt à voler !
  </text>
</svg>
