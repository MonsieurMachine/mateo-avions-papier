<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 400" fill="none" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="paperShadow5" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="3"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow5" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6366f1"/>
    </marker>
    <linearGradient id="foldedTriL5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff7ed"/>
      <stop offset="1" stop-color="#fed7aa" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="foldedTriR5" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff7ed"/>
      <stop offset="1" stop-color="#fed7aa" stop-opacity="0.7"/>
    </linearGradient>
  </defs>

  <!-- House-shape paper (after both nose folds) — BEFORE fold in half -->
  <g transform="translate(0, 0)">
    <polygon
      points="160,40 240,120 240,360 80,360 80,120"
      fill="#fefaf4" stroke="#d6c9ae" stroke-width="1.5"
      filter="url(#paperShadow5)"/>

    <!-- Center crease (existing from step 2) -->
    <line x1="160" y1="40" x2="160" y2="360"
          stroke="#a8a29e" stroke-width="1" stroke-dasharray="3 3" stroke-linecap="round" opacity="0.7"/>

    <!-- Folded triangles (from step 3 and 4, still visible on top) -->
    <polygon points="80,120 160,40 160,120" fill="url(#foldedTriL5)" stroke="#c4a07c" stroke-width="1"/>
    <polygon points="240,120 160,40 160,120" fill="url(#foldedTriR5)" stroke="#c4a07c" stroke-width="1"/>

    <!-- Mountain fold indicator (fold BACK, triangles inside) — use mountain fold style: dash-dot -->
    <!-- Center fold emphasized as the active fold -->
    <line x1="160" y1="40" x2="160" y2="360"
          stroke="#dc2626" stroke-width="2" stroke-dasharray="8 3 2 3" stroke-linecap="round"/>

    <!-- Arrow indicating fold in half (from right side curving around back to left) -->
    <path d="M 220 240 Q 250 200 220 160"
          stroke="#6366f1" stroke-width="2.5" stroke-linecap="round"
          fill="none" marker-end="url(#arrow5)"/>
    <path d="M 200 260 Q 170 220 200 180"
          stroke="#6366f1" stroke-width="2" stroke-linecap="round"
          fill="none" stroke-dasharray="2 3" opacity="0.6"/>
  </g>

  <!-- Label -->
  <text x="160" y="390" text-anchor="middle" font-size="12" fill="#78716c" letter-spacing="0.5">
    Plie en 2 — triangles à l'intérieur
  </text>
</svg>
