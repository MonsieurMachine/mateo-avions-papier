<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 400" fill="none" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="paperShadow7" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="3"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow7" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6366f1"/>
    </marker>
    <marker id="flipArrow7" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#14b8a6"/>
    </marker>
  </defs>

  <!-- Flip (retournement) indicator at top -->
  <g>
    <path d="M 90 55 Q 160 25 230 55"
          stroke="#14b8a6" stroke-width="2.2" stroke-linecap="round"
          fill="none" marker-end="url(#flipArrow7)"/>
    <text x="160" y="80" text-anchor="middle" font-size="11" font-weight="500" fill="#0f766e" letter-spacing="0.8">
      RETOURNE L'AVION
    </text>
  </g>

  <!-- Folded plane AFTER flip (showing the other side now, wing already folded on this side visible through) -->
  <!-- Now nose is still pointing left (same orientation) but other face is showing -->
  <polygon
    points="40,225 100,145 290,145 290,305 40,305"
    fill="#fefaf4" stroke="#d6c9ae" stroke-width="1.5"
    filter="url(#paperShadow7)"/>

  <!-- Spine -->
  <line x1="40" y1="305" x2="290" y2="305"
        stroke="#a8a29e" stroke-width="1.3" stroke-dasharray="3 3" stroke-linecap="round" opacity="0.8"/>

  <!-- First wing already folded (visible at bottom as a darker edge, showing it's there) -->
  <line x1="60" y1="305" x2="285" y2="305"
        stroke="#c4a07c" stroke-width="2" opacity="0.6"/>

  <!-- Nose fold crease trace -->
  <line x1="40" y1="225" x2="100" y2="145"
        stroke="#c4a07c" stroke-width="1" stroke-dasharray="2 2" stroke-linecap="round" opacity="0.7"/>

  <!-- Valley fold line for the second wing -->
  <line x1="40" y1="225" x2="290" y2="225"
        stroke="#3b82f6" stroke-width="2" stroke-dasharray="6 3" stroke-linecap="round"/>

  <!-- Wing area shading -->
  <polygon points="40,225 100,145 290,145 290,225"
           fill="#dbeafe" opacity="0.4"/>

  <!-- Arrow: fold this second wing down -->
  <path d="M 220 160 Q 245 200 235 285"
        stroke="#6366f1" stroke-width="2.5" stroke-linecap="round"
        fill="none" marker-end="url(#arrow7)"/>

  <!-- Label -->
  <text x="160" y="390" text-anchor="middle" font-size="12" fill="#78716c" letter-spacing="0.5">
    Plie la deuxième aile pareil
  </text>
</svg>
