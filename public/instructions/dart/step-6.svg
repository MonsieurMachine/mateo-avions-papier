<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 400" fill="none" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="paperShadow6" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="3"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow6" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6366f1"/>
    </marker>
  </defs>

  <!-- Folded plane, side view — nose left, spine bottom -->
  <polygon
    points="40,200 100,120 290,120 290,280 40,280"
    fill="#fefaf4" stroke="#d6c9ae" stroke-width="1.5"
    filter="url(#paperShadow6)"/>

  <!-- Spine (bottom edge, the center fold from step 5) -->
  <line x1="40" y1="280" x2="290" y2="280"
        stroke="#a8a29e" stroke-width="1.3" stroke-dasharray="3 3" stroke-linecap="round" opacity="0.8"/>
  <text x="165" y="298" text-anchor="middle" font-size="9" fill="#a8a29e" letter-spacing="1">PLIURE DU VENTRE</text>

  <!-- Nose fold crease trace (from step 3/4, now visible on side) -->
  <line x1="40" y1="200" x2="100" y2="120"
        stroke="#c4a07c" stroke-width="1" stroke-dasharray="2 2" stroke-linecap="round" opacity="0.7"/>

  <!-- Valley fold line for the wing (where we fold) -->
  <line x1="40" y1="200" x2="290" y2="200"
        stroke="#3b82f6" stroke-width="2" stroke-dasharray="6 3" stroke-linecap="round"/>

  <!-- Wing area shading (subtle, to indicate what's being folded) -->
  <polygon points="40,200 100,120 290,120 290,200"
           fill="#dbeafe" opacity="0.4"/>

  <!-- Arrow: top of wing curving down toward spine -->
  <path d="M 220 135 Q 245 180 235 260"
        stroke="#6366f1" stroke-width="2.5" stroke-linecap="round"
        fill="none" marker-end="url(#arrow6)"/>

  <!-- Label -->
  <text x="160" y="390" text-anchor="middle" font-size="12" fill="#78716c" letter-spacing="0.5">
    Rabats l'aile du dessus vers le bas
  </text>
</svg>
