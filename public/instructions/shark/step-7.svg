<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 400" fill="none" font-family="system-ui,-apple-system,sans-serif">
<defs>
  <filter id="ps" x="-10%" y="-10%" width="120%" height="120%">
    <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
    <feOffset dx="0" dy="3"/>
    <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
    <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#6366f1"/>
  </marker>
  <marker id="arrT" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#14b8a6"/>
  </marker>
  <linearGradient id="foldTri" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#fff7ed"/>
    <stop offset="1" stop-color="#fed7aa" stop-opacity="0.7"/>
  </linearGradient>
</defs>

<polygon points="160,30 200,150 200,370 120,370 120,150" fill="#fefaf4" stroke="#d6c9ae" stroke-width="1.5" filter="url(#ps)"/>
<line x1="160" y1="30" x2="160" y2="370" stroke="#a8a29e" stroke-width="1" stroke-dasharray="3 3" stroke-linecap="round" opacity="0.7"/>
<!-- accordion fold lines -->
<line x1="135" y1="60" x2="185" y2="60" stroke="#3b82f6" stroke-width="1.7" stroke-dasharray="5 3" stroke-linecap="round"/>
<line x1="145" y1="80" x2="175" y2="80" stroke="#dc2626" stroke-width="2" stroke-dasharray="8 3 2 3" stroke-linecap="round"/>
<path d="M 160 35 Q 175 60 160 85 Q 175 105 160 125" stroke="#6366f1" stroke-width="2" fill="none" stroke-linecap="round" marker-end="url(#arr)"/>
<text x="240" y="75" font-size="9" fill="#dc2626" font-weight="600">accordéon</text>
<text x="160" y="390" text-anchor="middle" font-size="12" fill="#78716c">Pointe bas 3 cm + haut — nez de requin</text>
</svg>
