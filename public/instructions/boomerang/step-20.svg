<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 400" fill="none" font-family="system-ui,-apple-system,sans-serif">
<defs>
  <filter id="ps" x="-10%" y="-10%" width="120%" height="120%">
    <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
    <feOffset dx="0" dy="3"/>
    <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
    <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#6366f1"/>
  </marker>
  <marker id="arrT" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#14b8a6"/>
  </marker>
  <linearGradient id="foldTri" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#fff7ed"/>
    <stop offset="1" stop-color="#fed7aa" stop-opacity="0.7"/>
  </linearGradient>
<linearGradient id="pWingL" x1="0.5" y1="0" x2="0.2" y2="1">
    <stop offset="0" stop-color="hsl(22, 77%, 58%)"/>
    <stop offset="0.55" stop-color="hsl(22, 85%, 43%)"/>
    <stop offset="1" stop-color="hsl(22, 89%, 28%)"/>
  </linearGradient>
  <linearGradient id="pWingR" x1="0.5" y1="0" x2="0.8" y2="1">
    <stop offset="0" stop-color="hsl(22, 85%, 43%)"/>
    <stop offset="0.5" stop-color="hsl(22, 89%, 32%)"/>
    <stop offset="1" stop-color="hsl(22, 94%, 20%)"/>
  </linearGradient></defs>

<g transform="translate(160, 180)">
  <polygon points="-100,20 -15,-25 0,0 15,-25 100,20" fill="hsl(22, 85%, 55%)" stroke="hsl(22, 85%, 30%)" stroke-width="1.5"/>
</g>
<!-- return path -->
<path d="M 260 190 Q 290 270 200 310 Q 130 290 90 270" stroke="#dc2626" stroke-width="2" fill="none" stroke-linecap="round" stroke-dasharray="4 3"/>
<text x="260" y="178" font-size="12">🪃</text>
<text x="160" y="355" text-anchor="middle" font-size="11" fill="#0f766e" font-weight="700">Lance en tournant — il revient !</text>
</svg>
