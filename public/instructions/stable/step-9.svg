<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" fill="none">
  <!-- Finished stable glider - front view -->
  <!-- Fuselage -->
  <line x1="150" y1="50" x2="150" y2="310" stroke="#94a3b8" stroke-width="3"/>
  <!-- Left wing (wider, stable) -->
  <polygon points="150,100 30,260 150,310" fill="#bae6fd" stroke="#0ea5e9" stroke-width="2"/>
  <!-- Right wing (wider, stable) -->
  <polygon points="150,100 270,260 150,310" fill="#bae6fd" stroke="#0ea5e9" stroke-width="2"/>
  <!-- Nose point -->
  <circle cx="150" cy="50" r="4" fill="#0ea5e9"/>
  <!-- Trailing edge flaps -->
  <line x1="90" y1="280" x2="90" y2="295" stroke="#ef4444" stroke-width="2"/>
  <line x1="210" y1="280" x2="210" y2="295" stroke="#ef4444" stroke-width="2"/>
  <text x="90" y="305" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#ef4444">Volet</text>
  <text x="210" y="305" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#ef4444">Volet</text>
  <!-- V angle indicator -->
  <path d="M50 245 L150 275 L250 245" stroke="#ef4444" stroke-width="1.5" fill="none" stroke-dasharray="4 3"/>
  <text x="150" y="235" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#ef4444">L&#233;ger V</text>
  <!-- Small scissors/cut indicator -->
  <text x="150" y="335" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#94a3b8">Couper de petits volets &#224; l'arri&#232;re</text>
  <!-- Success -->
  <text x="150" y="365" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#16a34a" font-weight="bold">Pr&#234;t &#224; planer !</text>
  <text x="150" y="390" text-anchor="middle" font-family="sans-serif" font-size="24">&#128640;</text>
</svg>