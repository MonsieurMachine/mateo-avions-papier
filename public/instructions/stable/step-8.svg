<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" fill="none">
  <!-- Side view folded in half -->
  <polygon points="150,20 150,380 250,380 250,260" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
  <!-- Nose layers -->
  <polygon points="150,20 250,260 150,260" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5"/>
  <!-- Wing fold line -->
  <line x1="150" y1="220" x2="250" y2="220" stroke="#ef4444" stroke-width="2" stroke-dasharray="6 3"/>
  <!-- Arrow showing wing fold down -->
  <path d="M200 180 C210 190 210 205 205 215" stroke="#ef4444" stroke-width="2.5" fill="none" marker-end="url(#arr8)"/>
  <defs>
    <marker id="arr8" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8" fill="#ef4444"/>
    </marker>
  </defs>
  <!-- Wing area highlight -->
  <polygon points="150,220 250,220 250,380 150,380" fill="#bae6fd" fill-opacity="0.3" stroke="none"/>
  <text x="200" y="310" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#0284c7">Aile</text>
  <text x="150" y="395" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#64748b">Former les ailes</text>
</svg>