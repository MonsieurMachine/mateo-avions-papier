<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 400" fill="none" font-family="system-ui,-apple-system,sans-serif">
<defs>
  <filter id="ps" x="-10%" y="-10%" width="120%" height="120%">
    <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
    <feOffset dx="0" dy="3"/>
    <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
    <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#6366f1"/>
  </marker>
  <marker id="arrT" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#14b8a6"/>
  </marker>
  <linearGradient id="foldTri" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#fff7ed"/>
    <stop offset="1" stop-color="#fed7aa" stop-opacity="0.7"/>
  </linearGradient>
</defs>

<polygon points="40,215 100,135 290,135 290,295 40,295" fill="#fefaf4" stroke="#d6c9ae" stroke-width="1.5" filter="url(#ps)"/>
<line x1="40" y1="295" x2="290" y2="295" stroke="#a8a29e" stroke-width="1.3" stroke-dasharray="3 3" stroke-linecap="round" opacity="0.85"/>
<text x="165" y="312" text-anchor="middle" font-size="9" fill="#a8a29e" letter-spacing="1">PLIURE CENTRALE</text>
<line x1="40" y1="215" x2="100" y2="135" stroke="#c4a07c" stroke-width="1" stroke-dasharray="2 2" opacity="0.7"/>
<line x1="40" y1="215" x2="290" y2="215" stroke="#3b82f6" stroke-width="1.7" stroke-dasharray="5 3" stroke-linecap="round"/>
<polygon points="40,215 100,135 290,135 290,215" fill="#dbeafe" opacity="0.35"/>
<path d="M 220 150 Q 245 200 235 275" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round" fill="none" marker-end="url(#arr)" />
<text x="160" y="355" text-anchor="middle" font-size="10" fill="#a8a29e" letter-spacing="1">CHAQUE CÔTÉ</text>
<text x="160" y="390" text-anchor="middle" font-size="12" fill="#78716c">Forme les ailes — rabats chaque côté</text>
</svg>
