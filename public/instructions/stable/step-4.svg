<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" fill="none">
  <!-- Paper -->
  <rect x="50" y="20" width="200" height="360" rx="2" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
  <!-- Center line -->
  <line x1="150" y1="20" x2="150" y2="380" stroke="#0ea5e9" stroke-width="1.5" stroke-dasharray="6 3"/>
  <!-- Left triangle -->
  <polygon points="50,20 150,140 150,20" fill="#bae6fd" stroke="#0ea5e9" stroke-width="2"/>
  <!-- Right triangle -->
  <polygon points="250,20 150,140 150,20" fill="#bae6fd" stroke="#0ea5e9" stroke-width="2"/>
  <text x="150" y="80" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#0284c7">&#9650;</text>
  <text x="150" y="395" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#64748b">Coin droit &#8594; centre</text>
</svg>