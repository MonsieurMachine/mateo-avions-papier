<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 400" fill="none" font-family="system-ui,-apple-system,sans-serif">
<defs>
  <filter id="ps" x="-10%" y="-10%" width="120%" height="120%">
    <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
    <feOffset dx="0" dy="3"/>
    <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
    <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#6366f1"/>
  </marker>
  <marker id="arrT" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#14b8a6"/>
  </marker>
  <linearGradient id="foldTri" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#fff7ed"/>
    <stop offset="1" stop-color="#fed7aa" stop-opacity="0.7"/>
  </linearGradient>
</defs>

<polygon points="80,80 240,80 240,370 80,370" fill="#fefaf4" stroke="#d6c9ae" stroke-width="1.5" filter="url(#ps)"/>
<polygon points="112,80 208,80 160,200" fill="#fef3c7" stroke="#d6c9ae" stroke-width="1" opacity="0.45"/>
<line x1="160" y1="80" x2="160" y2="370" stroke="#a8a29e" stroke-width="1" stroke-dasharray="3 3" stroke-linecap="round" opacity="0.7"/>
<!-- folded corners DON'T reach center — leave 1cm gap -->
<polygon points="80,80 150,80 150,170" fill="url(#foldTri)" stroke="#c4a07c" stroke-width="1.2"/>
<polygon points="240,80 170,80 170,170" fill="url(#foldTri)" stroke="#c4a07c" stroke-width="1.2"/>
<line x1="80" y1="80" x2="150" y2="170" stroke="#3b82f6" stroke-width="1.7" stroke-dasharray="5 3" stroke-linecap="round"/>
<line x1="240" y1="80" x2="170" y2="170" stroke="#3b82f6" stroke-width="1.7" stroke-dasharray="5 3" stroke-linecap="round"/>
<path d="M 95 100 Q 130 95 145 155" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round" fill="none" marker-end="url(#arr)" />
<path d="M 225 100 Q 190 95 175 155" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round" fill="none" marker-end="url(#arr)" />
<!-- gap indicator -->
<line x1="150" y1="170" x2="170" y2="170" stroke="#dc2626" stroke-width="1.5"/>
<text x="160" y="195" text-anchor="middle" font-size="9" fill="#dc2626" font-weight="600">↕ ~1 cm (ailes de mouette)</text>
<text x="160" y="390" text-anchor="middle" font-size="12" fill="#78716c">Coins → centre, laisse 1 cm entre les bords</text>
</svg>
