<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 400" fill="none" font-family="system-ui,-apple-system,sans-serif">
<defs>
  <filter id="ps" x="-10%" y="-10%" width="120%" height="120%">
    <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
    <feOffset dx="0" dy="3"/>
    <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
    <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#6366f1"/>
  </marker>
  <marker id="arrT" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#14b8a6"/>
  </marker>
  <linearGradient id="foldTri" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#fff7ed"/>
    <stop offset="1" stop-color="#fed7aa" stop-opacity="0.7"/>
  </linearGradient>
</defs>

<polygon points="80,110 240,110 240,370 80,370" fill="#fefaf4" stroke="#d6c9ae" stroke-width="1.5" filter="url(#ps)"/>
<line x1="160" y1="110" x2="160" y2="370" stroke="#a8a29e" stroke-width="1" stroke-dasharray="3 3" stroke-linecap="round" opacity="0.7"/>
<polygon points="80,110 160,110 160,190" fill="url(#foldTri)" stroke="#c4a07c" stroke-width="1" opacity="0.9"/>
<polygon points="240,110 160,110 160,190" fill="url(#foldTri)" stroke="#c4a07c" stroke-width="1" opacity="0.9"/>
<polygon points="95,110 160,110 160,165" fill="url(#foldTri)" opacity="0.7"/>
<line x1="95" y1="110" x2="160" y2="165" stroke="#c4a07c" stroke-width="1" stroke-linecap="round"/>
<polygon points="225,110 160,110 160,165" fill="url(#foldTri)" opacity="0.85"/>
<line x1="225" y1="110" x2="160" y2="165" stroke="#3b82f6" stroke-width="1.7" stroke-dasharray="5 3" stroke-linecap="round"/>
<path d="M 215 125 Q 195 125 170 160" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round" fill="none" marker-end="url(#arr)" />
<text x="160" y="390" text-anchor="middle" font-size="12" fill="#78716c">Bord incliné droit → centre</text>
</svg>
