<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 400" fill="none" font-family="system-ui,-apple-system,sans-serif">
<defs>
  <filter id="ps" x="-10%" y="-10%" width="120%" height="120%">
    <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
    <feOffset dx="0" dy="3"/>
    <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
    <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#6366f1"/>
  </marker>
  <marker id="arrT" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#14b8a6"/>
  </marker>
  <linearGradient id="foldTri" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#fff7ed"/>
    <stop offset="1" stop-color="#fed7aa" stop-opacity="0.7"/>
  </linearGradient>
</defs>

<polygon points="80,100 240,100 240,370 80,370" fill="#fefaf4" stroke="#d6c9ae" stroke-width="1.5" filter="url(#ps)"/>
<line x1="160" y1="100" x2="160" y2="370" stroke="#a8a29e" stroke-width="1" stroke-dasharray="3 3" stroke-linecap="round" opacity="0.7"/>
<polygon points="80,100 160,100 160,170" fill="url(#foldTri)" opacity="0.5"/>
<polygon points="240,100 160,100 160,170" fill="url(#foldTri)" opacity="0.5"/>
<line x1="130" y1="125" x2="190" y2="125" stroke="#3b82f6" stroke-width="1.7" stroke-dasharray="5 3" stroke-linecap="round"/>
<path d="M 160 100 Q 180 125 160 150" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round" fill="none" marker-end="url(#arr)"/>
<text x="220" y="140" font-size="10" fill="#dc2626" font-weight="600">3e pli</text>
<text x="160" y="390" text-anchor="middle" font-size="12" fill="#78716c">Dernier pli du nez (~2 cm)</text>
</svg>
