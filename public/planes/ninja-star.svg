<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" fill="none">
  <defs>
    <linearGradient id="ninja-star-back" x1="0.3" y1="0.2" x2="0.1" y2="0.9">
      <stop offset="0" stop-color="hsl(240, 36%, 48%)"/>
      <stop offset="1" stop-color="hsl(240, 41%, 38%)"/>
    </linearGradient>
    <linearGradient id="ninja-star-fuselage" x1="0.4" y1="0" x2="0.1" y2="1">
      <stop offset="0" stop-color="hsl(240, 41%, 38%)"/>
      <stop offset="1" stop-color="hsl(240, 43%, 30%)"/>
    </linearGradient>
    <linearGradient id="ninja-star-front" x1="0.6" y1="0" x2="0.3" y2="1">
      <stop offset="0" stop-color="hsl(240, 14%, 92%)"/>
      <stop offset="0.45" stop-color="hsl(240, 18%, 82%)"/>
      <stop offset="1" stop-color="hsl(240, 27%, 68%)"/>
    </linearGradient>
    <filter id="ninja-star-sh" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3.5"/>
      <feOffset dx="2" dy="5"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <ellipse cx="200" cy="300" rx="115" ry="8" fill="hsl(240, 25%, 18%)" opacity="0.18"/>

  <g filter="url(#ninja-star-sh)">
    <!-- Back wing: nose → backTail → fuselageInner (upper portion, darker) -->
    <polygon points="320,115 80,175 115,215" fill="url(#ninja-star-back)"/>

    <!-- Fuselage strip: nose → fuselageInner → frontInner (thin dark edge) -->
    <polygon points="320,115 115,215 125,235" fill="url(#ninja-star-fuselage)"/>

    <!-- Front wing: nose → frontInner → frontTail (lower portion, lightest) -->
    <polygon points="320,115 125,235 120,275" fill="url(#ninja-star-front)"/>

    <!-- Leading edge highlight (nose to backTail) — catches light -->
    <line x1="320" y1="115" x2="80" y2="175" stroke="hsl(240, 14%, 92%)" stroke-width="1.3" stroke-linecap="round" opacity="0.5"/>

    <!-- Ridge line between back wing and fuselage (paper fold cue) -->
    <line x1="320" y1="115" x2="115" y2="215" stroke="hsl(240, 43%, 30%)" stroke-width="1" stroke-linecap="round" opacity="0.75"/>

    <!-- Ridge line between fuselage and front wing -->
    <line x1="320" y1="115" x2="125" y2="235" stroke="hsl(240, 41%, 38%)" stroke-width="0.8" stroke-linecap="round" opacity="0.6"/>

    <!-- Trailing edge of front wing (tail) -->
    <line x1="125" y1="235" x2="120" y2="275" stroke="hsl(240, 43%, 30%)" stroke-width="1.2" stroke-linecap="round" opacity="0.45"/>

    <!-- Nose tip highlight -->
    <circle cx="320" cy="115" r="2.5" fill="hsl(240, 14%, 92%)" opacity="0.9"/>

    <polygon points="275,165 295,150 290,180" fill="hsl(240, 27%, 68%)" opacity="0.7"/><polygon points="140,280 125,300 155,295" fill="hsl(240, 36%, 48%)" opacity="0.65"/>
  </g>
</svg>
