    <line x1="338" y1="87" x2="103" y2="252" stroke="#451a03" stroke-width="0.8" stroke-linecap="round" opacity="0.55"/>

    <line x1="230" y1="125" x2="250" y2="150" stroke="#451a03" stroke-width="1" stroke-linecap="round" opacity="0.55"/>
