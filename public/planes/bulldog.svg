    <line x1="55" y1="200" x2="100" y2="250" stroke="#451a03" stroke-width="1.2" stroke-linecap="round" opacity="0.45"/>
    <line x1="100" y1="250" x2="145" y2="305" stroke="#1c0701" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>

