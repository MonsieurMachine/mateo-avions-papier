<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" fill="none">
  <defs>
    <linearGradient id="concorde-back" x1="0.3" y1="0.2" x2="0.1" y2="0.9">
      <stop offset="0" stop-color="hsl(210, 6%, 48%)"/>
      <stop offset="1" stop-color="hsl(210, 7%, 38%)"/>
    </linearGradient>
    <linearGradient id="concorde-fuselage" x1="0.4" y1="0" x2="0.1" y2="1">
      <stop offset="0" stop-color="hsl(210, 7%, 38%)"/>
      <stop offset="1" stop-color="hsl(210, 8%, 30%)"/>
    </linearGradient>
    <linearGradient id="concorde-front" x1="0.6" y1="0" x2="0.3" y2="1">
      <stop offset="0" stop-color="hsl(210, 2%, 92%)"/>
      <stop offset="0.45" stop-color="hsl(210, 3%, 82%)"/>
      <stop offset="1" stop-color="hsl(210, 5%, 68%)"/>
    </linearGradient>
    <filter id="concorde-sh" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3.5"/>
      <feOffset dx="2" dy="5"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <ellipse cx="200" cy="300" rx="115" ry="8" fill="hsl(210, 25%, 18%)" opacity="0.18"/>

  <g filter="url(#concorde-sh)">
    <!-- Back wing: nose → backTail → fuselageInner (upper portion, darker) -->
    <polygon points="355,70 45,190 95,240" fill="url(#concorde-back)"/>

    <!-- Fuselage strip: nose → fuselageInner → frontInner (thin dark edge) -->
    <polygon points="355,70 95,240 110,260" fill="url(#concorde-fuselage)"/>

    <!-- Front wing: nose → frontInner → frontTail (lower portion, lightest) -->
    <polygon points="355,70 110,260 100,300" fill="url(#concorde-front)"/>

    <!-- Leading edge highlight (nose to backTail) — catches light -->
    <line x1="355" y1="70" x2="45" y2="190" stroke="hsl(210, 2%, 92%)" stroke-width="1.3" stroke-linecap="round" opacity="0.5"/>

    <!-- Ridge line between back wing and fuselage (paper fold cue) -->
    <line x1="355" y1="70" x2="95" y2="240" stroke="hsl(210, 8%, 30%)" stroke-width="1" stroke-linecap="round" opacity="0.75"/>

    <!-- Ridge line between fuselage and front wing -->
    <line x1="355" y1="70" x2="110" y2="260" stroke="hsl(210, 7%, 38%)" stroke-width="0.8" stroke-linecap="round" opacity="0.6"/>

    <!-- Trailing edge of front wing (tail) -->
    <line x1="110" y1="260" x2="100" y2="300" stroke="hsl(210, 8%, 30%)" stroke-width="1.2" stroke-linecap="round" opacity="0.45"/>

    <!-- Nose tip highlight -->
    <circle cx="355" cy="70" r="2.5" fill="hsl(210, 2%, 92%)" opacity="0.9"/>

    
  </g>
</svg>
