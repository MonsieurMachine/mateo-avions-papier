<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" fill="none">
  <defs>
    <linearGradient id="concorde-lw" x1="0.5" y1="0" x2="0.2" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="0.55" stop-color="#e2e8f0"/>
      <stop offset="1" stop-color="#cbd5e1"/>
    </linearGradient>
    <linearGradient id="concorde-rw" x1="0.5" y1="0" x2="0.8" y2="1">
      <stop offset="0" stop-color="#e2e8f0"/>
      <stop offset="0.5" stop-color="#cbd5e1"/>
      <stop offset="1" stop-color="#94a3b8"/>
    </linearGradient>
    <filter id="concorde-sh" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="3" dy="5"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <ellipse cx="200" cy="295" rx="115" ry="9" fill="#1e293b" opacity="0.14"/>

  <g filter="url(#concorde-sh)">
    <polygon points="360,60 40,215 100,260" fill="url(#concorde-lw)"/>
    <polygon points="360,60 100,260 165,305" fill="url(#concorde-rw)"/>

    <line x1="360" y1="60" x2="100" y2="260" stroke="#f8fafc" stroke-width="2" stroke-linecap="round" opacity="0.85"/>
    <line x1="363" y1="62" x2="103" y2="262" stroke="#94a3b8" stroke-width="0.8" stroke-linecap="round" opacity="0.55"/>

    <line x1="245" y1="110" x2="265" y2="140" stroke="#94a3b8" stroke-width="1" stroke-linecap="round" opacity="0.55"/>
    <line x1="265" y1="140" x2="280" y2="175" stroke="#475569" stroke-width="1" stroke-linecap="round" opacity="0.5"/>

    <line x1="40" y1="215" x2="100" y2="260" stroke="#94a3b8" stroke-width="1.2" stroke-linecap="round" opacity="0.45"/>
    <line x1="100" y1="260" x2="165" y2="305" stroke="#475569" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>

    <circle cx="360" cy="60" r="2.2" fill="#ffffff" opacity="0.9"/>

    
