<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" fill="none">
  <defs>
    <linearGradient id="falcon-lw" x1="0.5" y1="0" x2="0.2" y2="1">
      <stop offset="0" stop-color="#fde68a"/>
      <stop offset="0.55" stop-color="#a16207"/>
      <stop offset="1" stop-color="#713f12"/>
    </linearGradient>
    <linearGradient id="falcon-rw" x1="0.5" y1="0" x2="0.8" y2="1">
      <stop offset="0" stop-color="#a16207"/>
      <stop offset="0.5" stop-color="#713f12"/>
      <stop offset="1" stop-color="#451a03"/>
    </linearGradient>
    <filter id="falcon-sh" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="3" dy="5"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <ellipse cx="200" cy="295" rx="115" ry="9" fill="#1e293b" opacity="0.14"/>

