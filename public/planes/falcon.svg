    <polygon points="340,70 90,250 131,307" fill="url(#falcon-rw)"/>

    <line x1="340" y1="70" x2="90" y2="250" stroke="#fde68a" stroke-width="2" stroke-linecap="round" opacity="0.85"/>
    <line x1="343" y1="72" x2="93" y2="252" stroke="#451a03" stroke-width="0.8" stroke-linecap="round" opacity="0.55"/>

    <line x1="220" y1="114" x2="240" y2="145" stroke="#451a03" stroke-width="1" stroke-linecap="round" opacity="0.55"/>
    <line x1="240" y1="145" x2="260" y2="180" stroke="#1c0701" stroke-width="1" stroke-linecap="round" opacity="0.5"/>

    <line x1="49" y1="193" x2="90" y2="250" stroke="#451a03" stroke-width="1.2" stroke-linecap="round" opacity="0.45"/>
    <line x1="90" y1="250" x2="131" y2="307" stroke="#1c0701" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>

    <circle cx="340" cy="70" r="2.2" fill="#ffffff" opacity="0.9"/>

    
