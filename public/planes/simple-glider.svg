<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" fill="none">
  <defs>
    <linearGradient id="simple-glider-back" x1="0.3" y1="0.2" x2="0.1" y2="0.9">
      <stop offset="0" stop-color="hsl(155, 44%, 48%)"/>
      <stop offset="1" stop-color="hsl(155, 50%, 38%)"/>
    </linearGradient>
    <linearGradient id="simple-glider-fuselage" x1="0.4" y1="0" x2="0.1" y2="1">
      <stop offset="0" stop-color="hsl(155, 50%, 38%)"/>
      <stop offset="1" stop-color="hsl(155, 52%, 30%)"/>
    </linearGradient>
    <linearGradient id="simple-glider-front" x1="0.6" y1="0" x2="0.3" y2="1">
      <stop offset="0" stop-color="hsl(155, 17%, 92%)"/>
      <stop offset="0.45" stop-color="hsl(155, 22%, 82%)"/>
      <stop offset="1" stop-color="hsl(155, 33%, 68%)"/>
    </linearGradient>
    <filter id="simple-glider-sh" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3.5"/>
      <feOffset dx="2" dy="5"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <ellipse cx="200" cy="300" rx="115" ry="8" fill="hsl(155, 25%, 18%)" opacity="0.18"/>

  <g filter="url(#simple-glider-sh)">
    <!-- Back wing: nose → backTail → fuselageInner (upper portion, darker) -->
    <polygon points="320,100 35,150 85,210" fill="url(#simple-glider-back)"/>

    <!-- Fuselage strip: nose → fuselageInner → frontInner (thin dark edge) -->
    <polygon points="320,100 85,210 100,235" fill="url(#simple-glider-fuselage)"/>

    <!-- Front wing: nose → frontInner → frontTail (lower portion, lightest) -->
    <polygon points="320,100 100,235 80,290" fill="url(#simple-glider-front)"/>

    <!-- Leading edge highlight (nose to backTail) — catches light -->
    <line x1="320" y1="100" x2="35" y2="150" stroke="hsl(155, 17%, 92%)" stroke-width="1.3" stroke-linecap="round" opacity="0.5"/>

    <!-- Ridge line between back wing and fuselage (paper fold cue) -->
    <line x1="320" y1="100" x2="85" y2="210" stroke="hsl(155, 52%, 30%)" stroke-width="1" stroke-linecap="round" opacity="0.75"/>

    <!-- Ridge line between fuselage and front wing -->
    <line x1="320" y1="100" x2="100" y2="235" stroke="hsl(155, 50%, 38%)" stroke-width="0.8" stroke-linecap="round" opacity="0.6"/>

    <!-- Trailing edge of front wing (tail) -->
    <line x1="100" y1="235" x2="80" y2="290" stroke="hsl(155, 52%, 30%)" stroke-width="1.2" stroke-linecap="round" opacity="0.45"/>

    <!-- Nose tip highlight -->
    <circle cx="320" cy="100" r="2.5" fill="hsl(155, 17%, 92%)" opacity="0.9"/>

    
  </g>
</svg>
