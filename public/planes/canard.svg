<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" fill="none">
  <defs>
    <linearGradient id="canard-back" x1="0.3" y1="0.2" x2="0.1" y2="0.9">
      <stop offset="0" stop-color="hsl(46, 64%, 48%)"/>
      <stop offset="1" stop-color="hsl(46, 72%, 38%)"/>
    </linearGradient>
    <linearGradient id="canard-fuselage" x1="0.4" y1="0" x2="0.1" y2="1">
      <stop offset="0" stop-color="hsl(46, 72%, 38%)"/>
      <stop offset="1" stop-color="hsl(46, 76%, 30%)"/>
    </linearGradient>
    <linearGradient id="canard-front" x1="0.6" y1="0" x2="0.3" y2="1">
      <stop offset="0" stop-color="hsl(46, 24%, 92%)"/>
      <stop offset="0.45" stop-color="hsl(46, 32%, 82%)"/>
      <stop offset="1" stop-color="hsl(46, 48%, 68%)"/>
    </linearGradient>
    <filter id="canard-sh" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3.5"/>
      <feOffset dx="2" dy="5"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <ellipse cx="200" cy="300" rx="115" ry="8" fill="hsl(46, 25%, 18%)" opacity="0.18"/>

  <g filter="url(#canard-sh)">
    <!-- Back wing: nose → backTail → fuselageInner (upper portion, darker) -->
    <polygon points="340,85 50,165 95,210" fill="url(#canard-back)"/>

    <!-- Fuselage strip: nose → fuselageInner → frontInner (thin dark edge) -->
    <polygon points="340,85 95,210 105,230" fill="url(#canard-fuselage)"/>

    <!-- Front wing: nose → frontInner → frontTail (lower portion, lightest) -->
    <polygon points="340,85 105,230 90,275" fill="url(#canard-front)"/>

    <!-- Leading edge highlight (nose to backTail) — catches light -->
    <line x1="340" y1="85" x2="50" y2="165" stroke="hsl(46, 24%, 92%)" stroke-width="1.3" stroke-linecap="round" opacity="0.5"/>

    <!-- Ridge line between back wing and fuselage (paper fold cue) -->
    <line x1="340" y1="85" x2="95" y2="210" stroke="hsl(46, 76%, 30%)" stroke-width="1" stroke-linecap="round" opacity="0.75"/>

    <!-- Ridge line between fuselage and front wing -->
    <line x1="340" y1="85" x2="105" y2="230" stroke="hsl(46, 72%, 38%)" stroke-width="0.8" stroke-linecap="round" opacity="0.6"/>

    <!-- Trailing edge of front wing (tail) -->
    <line x1="105" y1="230" x2="90" y2="275" stroke="hsl(46, 76%, 30%)" stroke-width="1.2" stroke-linecap="round" opacity="0.45"/>

    <!-- Nose tip highlight -->
    <circle cx="340" cy="85" r="2.5" fill="hsl(46, 24%, 92%)" opacity="0.9"/>

    <polygon points="285,100 250,90 270,115" fill="hsl(46, 64%, 48%)" opacity="0.9"/><polygon points="285,100 260,125 290,120" fill="hsl(46, 48%, 68%)" opacity="0.85"/>
  </g>
</svg>
