      <stop offset="0" stop-color="#fed7aa"/>
      <stop offset="0.55" stop-color="#f97316"/>
      <stop offset="1" stop-color="#c2410c"/>
    </linearGradient>
    <linearGradient id="boomerang-rw" x1="0.5" y1="0" x2="0.8" y2="1">
