    <polygon points="320,95 28,175 105,260" fill="url(#stable-lw)"/>
    <polygon points="320,95 105,260 190,335" fill="url(#stable-rw)"/>

    <line x1="320" y1="95" x2="105" y2="260" stroke="#bfdbfe" stroke-width="2" stroke-linecap="round" opacity="0.85"/>
    <line x1="323" y1="97" x2="108" y2="262" stroke="#1e3a8a" stroke-width="0.8" stroke-linecap="round" opacity="0.55"/>

    <line x1="228" y1="130" x2="215" y2="165" stroke="#1e3a8a" stroke-width="1" stroke-linecap="round" opacity="0.55"/>
    <line x1="215" y1="165" x2="195" y2="205" stroke="#172554" stroke-width="1" stroke-linecap="round" opacity="0.5"/>

    <line x1="28" y1="175" x2="105" y2="260" stroke="#1e3a8a" stroke-width="1.2" stroke-linecap="round" opacity="0.45"/>
    <line x1="105" y1="260" x2="190" y2="335" stroke="#172554" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>

    <circle cx="320" cy="95" r="2.2" fill="#ffffff" opacity="0.9"/>

    
