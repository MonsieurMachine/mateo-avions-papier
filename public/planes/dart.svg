<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" fill="none">
  <defs>
    <!-- Left wing gradient (main face, well-lit) -->
    <linearGradient id="dartLeft" x1="0.5" y1="0" x2="0.2" y2="1">
      <stop offset="0" stop-color="#fca5a5"/>
      <stop offset="0.55" stop-color="#ef4444"/>
      <stop offset="1" stop-color="#b91c1c"/>
    </linearGradient>

    <!-- Right wing gradient (slightly shaded) -->
    <linearGradient id="dartRight" x1="0.5" y1="0" x2="0.8" y2="1">
      <stop offset="0" stop-color="#ef4444"/>
      <stop offset="0.5" stop-color="#c53030"/>
      <stop offset="1" stop-color="#7f1d1d"/>
    </linearGradient>

    <!-- Nose fold accent (shows folded triangles on top of wings) -->
    <linearGradient id="dartNoseLeft" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#991b1b" stop-opacity="0"/>
      <stop offset="1" stop-color="#7f1d1d" stop-opacity="0.45"/>
    </linearGradient>
    <linearGradient id="dartNoseRight" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#450a0a" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#991b1b" stop-opacity="0"/>
    </linearGradient>

    <!-- Soft drop shadow -->
    <filter id="dartShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="3" dy="5" result="offsetBlur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Ground shadow ellipse -->
  <ellipse cx="200" cy="295" rx="115" ry="9" fill="#1e293b" opacity="0.14"/>

  <g filter="url(#dartShadow)">
    <!-- Left wing (upper face from viewer's POV) -->
    <polygon
      points="340,70 49,193 90,250"
      fill="url(#dartLeft)"
    />

    <!-- Right wing (lower face from viewer's POV) -->
    <polygon
      points="340,70 90,250 131,307"
      fill="url(#dartRight)"
    />

    <!-- Nose fold overlay on LEFT wing (subtle darker triangle showing tucked nose fold) -->
    <polygon
      points="340,70 220,114 240,145"
      fill="url(#dartNoseLeft)"
    />

    <!-- Nose fold overlay on RIGHT wing -->
    <polygon
      points="340,70 240,145 260,180"
      fill="url(#dartNoseRight)"
    />

    <!-- Fuselage ridge highlight (catches light, slightly raised) -->
    <line x1="340" y1="70" x2="90" y2="250"
          stroke="#fecaca" stroke-width="2" stroke-linecap="round" opacity="0.85"/>

    <!-- Thin darker line just under the ridge for definition -->
    <line x1="343" y1="72" x2="93" y2="252"
          stroke="#7f1d1d" stroke-width="0.8" stroke-linecap="round" opacity="0.55"/>

    <!-- Visible nose-fold crease line (left wing) -->
    <line x1="220" y1="114" x2="240" y2="145"
          stroke="#7f1d1d" stroke-width="1" stroke-linecap="round" opacity="0.55"/>

    <!-- Visible nose-fold crease line (right wing) -->
    <line x1="240" y1="145" x2="260" y2="180"
          stroke="#450a0a" stroke-width="1" stroke-linecap="round" opacity="0.5"/>

    <!-- Tail edge — left wing -->
    <line x1="49" y1="193" x2="90" y2="250"
          stroke="#7f1d1d" stroke-width="1.2" stroke-linecap="round" opacity="0.45"/>

    <!-- Tail edge — right wing -->
    <line x1="90" y1="250" x2="131" y2="307"
          stroke="#450a0a" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>

    <!-- Nose tip accent (tiny highlight to suggest sharpness) -->
    <circle cx="340" cy="70" r="2.2" fill="#fff5f5" opacity="0.9"/>
  </g>
</svg>
