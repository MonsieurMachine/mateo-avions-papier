<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" fill="none">
  <defs>
    <linearGradient id="nakamura-lock-back" x1="0.3" y1="0.2" x2="0.1" y2="0.9">
      <stop offset="0" stop-color="hsl(28, 56%, 48%)"/>
      <stop offset="1" stop-color="hsl(28, 63%, 38%)"/>
    </linearGradient>
    <linearGradient id="nakamura-lock-fuselage" x1="0.4" y1="0" x2="0.1" y2="1">
      <stop offset="0" stop-color="hsl(28, 63%, 38%)"/>
      <stop offset="1" stop-color="hsl(28, 67%, 30%)"/>
    </linearGradient>
    <linearGradient id="nakamura-lock-front" x1="0.6" y1="0" x2="0.3" y2="1">
      <stop offset="0" stop-color="hsl(28, 21%, 92%)"/>
      <stop offset="0.45" stop-color="hsl(28, 28%, 82%)"/>
      <stop offset="1" stop-color="hsl(28, 42%, 68%)"/>
    </linearGradient>
    <filter id="nakamura-lock-sh" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3.5"/>
      <feOffset dx="2" dy="5"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <ellipse cx="200" cy="300" rx="115" ry="8" fill="hsl(28, 25%, 18%)" opacity="0.18"/>

  <g filter="url(#nakamura-lock-sh)">
    <!-- Back wing: nose → backTail → fuselageInner (upper portion, darker) -->
    <polygon points="335,90 55,180 100,225" fill="url(#nakamura-lock-back)"/>

    <!-- Fuselage strip: nose → fuselageInner → frontInner (thin dark edge) -->
    <polygon points="335,90 100,225 110,245" fill="url(#nakamura-lock-fuselage)"/>

    <!-- Front wing: nose → frontInner → frontTail (lower portion, lightest) -->
    <polygon points="335,90 110,245 95,290" fill="url(#nakamura-lock-front)"/>

    <!-- Leading edge highlight (nose to backTail) — catches light -->
    <line x1="335" y1="90" x2="55" y2="180" stroke="hsl(28, 21%, 92%)" stroke-width="1.3" stroke-linecap="round" opacity="0.5"/>

    <!-- Ridge line between back wing and fuselage (paper fold cue) -->
    <line x1="335" y1="90" x2="100" y2="225" stroke="hsl(28, 67%, 30%)" stroke-width="1" stroke-linecap="round" opacity="0.75"/>

    <!-- Ridge line between fuselage and front wing -->
    <line x1="335" y1="90" x2="110" y2="245" stroke="hsl(28, 63%, 38%)" stroke-width="0.8" stroke-linecap="round" opacity="0.6"/>

    <!-- Trailing edge of front wing (tail) -->
    <line x1="110" y1="245" x2="95" y2="290" stroke="hsl(28, 67%, 30%)" stroke-width="1.2" stroke-linecap="round" opacity="0.45"/>

    <!-- Nose tip highlight -->
    <circle cx="335" cy="90" r="2.5" fill="hsl(28, 21%, 92%)" opacity="0.9"/>

    <polygon points="335,90 317,98 325,110" fill="hsl(28, 63%, 38%)" opacity="0.75"/>
  </g>
</svg>
